# Path to main directory
wdir: 'X:/user/liprandicn/mt-comparison/honda2014'
# Temperature data directory
temp_dir: 'X:/user/liprandicn/Data/ERA5/t2m_daily'


# Project name
project: 'ComparisonHonda' # MS (monthly statistics) or ERA5
# Define SSP scenario
scenario:  'SSP2_ERA5' # SSP1, SSP2, SSP3, SSP5
# Define years range
start_year: 2000
end_year: 2025
# Counterfactual 
counterfactual: False


### Set settings to extrapolate risk function

# Choose between extrapolating risk function (True) or keeping it as in Honda 2014 (False)
extrap_erf: False
# Set no extapolation, keep risk constant after min and max temperatures
temp_max: None 
# Set optimal temperature range 
optimal_range: 'max_1980-2010_p84'  